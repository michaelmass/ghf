pre-commit:
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc}'
      run: deno task fmt:check
    lint:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: deno task lint
    typecheck:
      glob: '*.{ts,tsx}'
      run: deno check ./src/cli.ts

format:
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc}'
      run: deno task fmt {staged_files}
    lint:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: deno task lint:fix {staged_files}
    typecheck:
      glob: '*.{ts,tsx}'
      run: deno check ./src/cli.ts
